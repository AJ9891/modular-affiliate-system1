<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launchpad 4 Cockpit</title>
    <link rel="stylesheet" href="css/cockpit.css" />
  </head>
  <body>
    <main class="cockpit-app theme-dark" id="cockpitApp">
      <div class="cockpit-bg"></div>
      <div class="cockpit-overlay" id="cockpitOverlay"></div>

      <section class="hotspot-layer" aria-label="Cockpit Modules">
        <button class="module hotspot vision-module" data-module="vision" style="--x:76%;--y:16%;--w:18%;--h:18%;" aria-label="Launchpad 4 Vision">
          <span class="module-name"><span id="visionIcon">⚓</span> Launchpad 4 Vision</span>
        </button>

        <button class="module hotspot" data-module="radar" data-route="/radar" style="--x:76%;--y:67%;--w:19%;--h:24%;">
          <span class="module-name">Radar</span>
        </button>
        <button class="module hotspot" data-module="settings" style="--x:86%;--y:86%;--w:10%;--h:10%;">
          <span class="module-name">Settings</span>
        </button>

        <button class="module hotspot" data-module="communications" data-route="/communications" style="--x:12%;--y:18%;--w:16%;--h:14%;">
          <span class="module-name">Communications</span>
        </button>
        <button class="module hotspot" data-module="fuel" data-route="/fuel" style="--x:12%;--y:44%;--w:16%;--h:16%;">
          <span class="module-name">Fuel</span>
        </button>
        <button class="module hotspot" data-module="navigation" data-route="/navigation" style="--x:12%;--y:70%;--w:16%;--h:16%;">
          <span class="module-name">Navigation</span>
        </button>

        <button class="module hotspot" data-module="propulsion" data-route="/propulsion" style="--x:39%;--y:42%;--w:16%;--h:14%;">
          <span class="module-name">Propulsion</span>
        </button>
        <button class="module hotspot" data-module="intelligence" style="--x:61%;--y:42%;--w:16%;--h:14%;">
          <span class="module-name">Intelligence</span>
        </button>
        <button class="module hotspot" data-module="resources" data-route="/resources" style="--x:50%;--y:66%;--w:20%;--h:13%;">
          <span class="module-name">Resources</span>
        </button>
      </section>

      <aside class="side-panel hidden" id="settingsPanel">
        <h3>Settings</h3>
        <label><input type="checkbox" id="themeToggle" /> Light Theme</label>
        <label><input type="checkbox" checked /> Notifications</label>
      </aside>

      <aside class="side-panel hidden" id="intelligencePanel">
        <h3>Intelligence</h3>
        <label for="voiceSelect">Select voice</label>
        <select id="voiceSelect">
          <option value="anchor">Anchor</option>
          <option value="rocket">Rocket</option>
          <option value="glitch">Glitch</option>
        </select>
        <label class="toggle-row">
          <input type="checkbox" id="autoAdaptToggle" />
          Auto Voice Adaptation
        </label>
      </aside>

      <section class="vision-console" id="visionConsole" aria-live="polite">
        <header class="vision-header">
          <h2 id="visionVoiceLabel">⚓ Anchor</h2>
          <div class="vision-header-actions">
            <button id="voicePing" class="icon-btn" title="Voice status">🎙️</button>
            <button id="visionExpand" class="icon-btn" title="Expand">⤢</button>
            <button id="visionClose" class="icon-btn" title="Close">✕</button>
          </div>
        </header>

        <div class="mission-timeline" id="missionTimeline"></div>

        <div class="vision-chat" id="visionChat"></div>

        <form class="vision-input-row" id="visionForm">
          <input type="text" id="visionInput" placeholder="Ask Vision for guidance..." />
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="vision-dock hidden" id="visionDock">
        <section><h4>Insights</h4><ul id="dockInsights"></ul></section>
        <section><h4>Saved Ideas</h4><ul id="dockIdeas"></ul></section>
        <section><h4>Alerts</h4><ul id="dockAlerts"></ul></section>
        <section><h4>Strategy</h4><ul id="dockStrategy"></ul></section>
      </aside>
    </main>

    <script type="module" src="js/cockpit-core.js"></script>
  </body>
</html>
